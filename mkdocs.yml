site_name: heygen-go
site_description: Go SDK for the HeyGen API
site_url: https://plexusone.github.io/heygen-go
repo_url: https://github.com/plexusone/heygen-go
repo_name: plexusone/heygen-go

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (PlexusOne default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - https://plexusone.dev/css/plexusone-mkdocs.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
    - Avatars: guides/avatars.md
    - LiveAvatar Streaming: guides/liveavatar.md
  - API Reference:
    - Overview: api/overview.md
    - Avatar: api/avatar.md
    - Asset: api/asset.md
    - LiveAvatar: api/liveavatar.md
  - Examples: examples.md
  - Releases:
    - v0.2.0: releases/v0.2.0.md
    - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/heygen-go
